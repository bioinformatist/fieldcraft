name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate agent configs
        uses: agent-sh/agnix@v0.34.0
        with:
          path: .
          target: generic
          strict: "true"
          version: "v0.34.0"

      - uses: cachix/install-nix-action@v31

      - name: Validate repository checks
        run: nix flake check
